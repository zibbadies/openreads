<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title></title>
        <link href="css/output.css" rel="stylesheet" />

        <style>
            .item.ghost {
                opacity: 0.25;
                cursor: grabbing;
            }

            .item.floating {
                position: fixed;
                pointer-events: none;
                z-index: 1000;
                opacity: 0.5;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
                cursor: grabbing;
            }

            #placeholder {
                width: 4px;
                height: 120px;
                border-radius: 8px;
                background: purple;
                flex-shrink: 0;
                display: none;
            }
        </style>
    </head>
    <body class="min-h-screen">
        <h1 class="text-red-900">DAAI</h1>

        <div class="min-w-xl w-[60%] ml-10 flex min-h-screen items-end">
            <div class="w-full flex flex-col border-l-16 border-r-16 border-amber-400">
                <div
                    id="row"
                    class="flex flex-row items-end gap-1 w-full min-h-52 pt-5 pl-2 pr-2 border-t-16 border-amber-400"
                >
                    <div class="item w-14 h-32 bg-amber-900" draggable="true"></div>
                    <div class="item w-16 h-36 bg-blue-900" draggable="true"></div>
                    <div class="item w-16 h-30 bg-red-900" draggable="true"></div>
                    <div class="item w-14 h-28 bg-yellow-900" draggable="true"></div>
                    <div class="item w-12 h-34 bg-green-900" draggable="true"></div>
                </div>
                <div
                    id="row"
                    class="flex flex-row items-end gap-1 w-full min-h-52 pt-5 pl-2 pr-2 border-t-16 border-amber-400"
                >
                    <div class="item w-14 h-32 bg-amber-900" draggable="true"></div>
                    <div class="item w-16 h-36 bg-blue-900" draggable="true"></div>
                    <div class="item w-16 h-30 bg-red-900" draggable="true"></div>
                    <div class="item w-14 h-28 bg-yellow-900" draggable="true"></div>
                    <div class="item w-12 h-34 bg-green-900" draggable="true"></div>
                </div>
                <div
                    id="row"
                    class="flex flex-row items-end gap-1 w-full min-h-52 pt-5 pl-2 pr-2 border-t-16 border-amber-400"
                >
                    <div class="item w-14 h-32 bg-amber-900" draggable="true"></div>
                    <div class="item w-16 h-36 bg-blue-900" draggable="true"></div>
                    <div class="item w-16 h-30 bg-red-900" draggable="true"></div>
                    <div class="item w-14 h-28 bg-yellow-900" draggable="true"></div>
                    <div class="item w-12 h-34 bg-green-900" draggable="true"></div>
                </div>

                <div id="placeholder"></div>
            </div>
        </div>
    </body>

    <script>
        window.addEventListener('load', () => {
            window.scrollTo(0, document.body.scrollHeight);
        });

        const placeholder = document.getElementById('placeholder');

        let dragged = null;
        let floater = null;
        let offsetX = 0,
            offsetY = 0;
        let lastRow = null;
        let lastBefore = undefined;

        // ── helpers ────────────────────────────────────────────────

        function allRows() {
            return [...document.querySelectorAll('#row')];
        }

        // Find the row whose vertical band is closest to clientY
        function getClosestRow(clientY) {
            let best = null,
                bestDist = Infinity;
            for (const row of allRows()) {
                const rect = row.getBoundingClientRect();
                // distance: 0 if inside, else distance to nearest edge
                const dist =
                    clientY < rect.top
                        ? rect.top - clientY
                        : clientY > rect.bottom
                          ? clientY - rect.bottom
                          : 0;
                if (dist < bestDist) {
                    bestDist = dist;
                    best = row;
                }
            }
            return best;
        }

        // Within a row, find the element before which to insert (null = append)
        function getInsertionPoint(row, clientX) {
            const siblings = [...row.children].filter(
                (el) => el !== placeholder && !el.classList.contains('ghost')
            );
            for (const el of siblings) {
                const rect = el.getBoundingClientRect();
                if (clientX < rect.left + rect.width / 2) return el;
            }
            return null;
        }

        // Snapshot X positions of all real items across all rows
        function snapPositions() {
            const map = new Map();
            document.querySelectorAll('.item:not(.ghost)').forEach((el) => {
                map.set(el, el.getBoundingClientRect().left);
            });
            return map;
        }

        function flip(before) {
            document.querySelectorAll('.item:not(.ghost)').forEach((el) => {
                const oldLeft = before.get(el);
                if (oldLeft === undefined) return;
                const newLeft = el.getBoundingClientRect().left;
                const delta = oldLeft - newLeft;
                if (Math.abs(delta) < 1) return;

                el.style.transition = 'none';
                el.style.transform = `translateX(${delta}px)`;
                el.getBoundingClientRect(); // flush
                el.style.transition = 'transform 0.2s ease';
                el.style.transform = '';
            });
        }

        // ── drag init ──────────────────────────────────────────────

        document.addEventListener('mousedown', (e) => {
            const item = e.target.closest('.item');
            if (!item || e.button !== 0) return;
            e.preventDefault();

            dragged = item;
            const rect = item.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            floater = item.cloneNode(true);
            floater.classList.add('floating');
            floater.style.width = rect.width + 'px';
            floater.style.height = rect.height + 'px';
            floater.style.left = rect.left + 'px';
            floater.style.top = rect.top + 'px';
            document.body.appendChild(floater);

            item.classList.add('ghost');
            placeholder.style.display = 'block';
            lastRow = item.parentElement;
            lastRow.insertBefore(placeholder, item);
            lastBefore = item;
        });

        // ── drag move ──────────────────────────────────────────────

        document.addEventListener('mousemove', (e) => {
            if (!dragged) return;

            floater.style.left = e.clientX - offsetX + 'px';
            floater.style.top = e.clientY - offsetY + 'px';

            const targetRow = getClosestRow(e.clientY);
            const insertBefore = getInsertionPoint(targetRow, e.clientX);

            if (targetRow === lastRow && insertBefore === lastBefore) return;
            lastRow = targetRow;
            lastBefore = insertBefore;

            const before = snapPositions();

            if (insertBefore) targetRow.insertBefore(placeholder, insertBefore);
            else targetRow.appendChild(placeholder);

            flip(before);
        });

        // ── drag end ───────────────────────────────────────────────

        document.addEventListener('mouseup', () => {
            if (!dragged) return;

            const before = snapPositions();
            placeholder.parentElement.insertBefore(dragged, placeholder);
            dragged.classList.remove('ghost');
            dragged.style.transition = 'none';
            dragged.style.transform = '';
            flip(before);

            placeholder.style.display = 'none';
            document.body.appendChild(placeholder); // park outside DOM flow
            floater.remove();

            dragged = null;
            floater = null;
            lastRow = null;
            lastBefore = undefined;
        });
    </script>
</html>
